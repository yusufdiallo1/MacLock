# XcodeGen spec for LockGuard.
# Regenerate the Xcode project with:  xcodegen generate
# (install XcodeGen via `brew install xcodegen`)

name: LockGuard
options:
  bundleIdPrefix: com.lockguard
  deploymentTarget:
    macOS: "26.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

targets:
  LockGuard:
    type: application
    platform: macOS
    sources:
      - path: LockGuard
    settings:
      base:
        PRODUCT_NAME: LockGuard
        PRODUCT_BUNDLE_IDENTIFIER: com.lockguard.app
        INFOPLIST_FILE: LockGuard/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: LockGuard/Resources/LockGuard.entitlements
        ENABLE_HARDENED_RUNTIME: YES
        GENERATE_INFOPLIST_FILE: NO
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
